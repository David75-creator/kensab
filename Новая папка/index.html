<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գենետիկայի Գաղտնիքները | Ինտերակտիվ Քվիզ</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #2d3436;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 650px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        /* Timer Bar */
        #timer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 6px;
            background: var(--primary-color);
            width: 100%;
            transition: width 1s linear;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-badge {
            background: var(--secondary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .timer-text {
            font-weight: bold;
            color: var(--primary-color);
        }

        h1 {
            font-size: 22px;
            margin: 20px 0;
            line-height: 1.4;
            color: #2d3436;
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin-top: 25px;
        }

        .option-btn {
            background: #f1f2f6;
            border: 2px solid transparent;
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: all 0.2s ease;
            outline: none;
        }

        .option-btn:hover {
            background: #dfe6e9;
            transform: translateY(-2px);
            border-color: var(--secondary-color);
        }

        .option-btn.correct {
            background: var(--correct-color) !important;
            color: white;
        }

        .option-btn.wrong {
            background: var(--wrong-color) !important;
            color: white;
        }

        /* Result Screen */
        #result-screen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            margin: 20px auto;
        }

        .restart-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="timer-bar"></div>
    
    <div id="quiz-screen">
        <div class="header">
            <span class="progress-badge" id="progress">Հարց 1/10</span>
            <span class="timer-text">Ժամանակ: <span id="seconds">15</span>վ</span>
        </div>
        
        <h1 id="question-text">Բեռնվում է...</h1>
        
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="result-screen">
        <h2 style="color: var(--primary-color)">Արդյունքը պատրաստ է</h2>
        <div class="score-circle" id="final-score">0/10</div>
        <p id="result-message" style="font-size: 18px;"></p>
        <button class="restart-btn" onclick="location.reload()">Սկսել նորից</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Ի՞նչ են գենետիկական հիվանդությունները:", a: ["Վարակներ", "Գենետիկական նյութի փոփոխություններ", "Սխալ սնունդ", "Արտաքին վնասվածքներ"], c: 1 },
        { q: "Ինչպե՞ս են փոխանցվում ժառանգական մուտացիաները:", a: ["Օդով", "Շփման միջոցով", "Սեռական բջիջների միջոցով ", "Չեն փոխանցվում"], c: 2 },
        { q: "Բնակչության քանի՞ տոկոսն ունի գենետիկ հիվանդություն:", a: ["10%", "2–4% ", "15%", "0.5%"], c: 1 },
        { q: "Քանի՞ նկարագրված գենետիկական հիվանդություն կա:", a: ["500", "1000", "3000+ ", "10,000"], c: 2 },
        { q: "Ինչի՞ հետևանք են գենային հիվանդությունները:", a: ["Առանձին գեների մուտացիաների ", "Ոսկորների կոտրվածքի", "Վիտամինների ավելցուկի", "Սթրեսի"], c: 0 },
        { q: "Դաունի համախտանիշը ո՞ր քրոմոսոմի տրիսոմիան է:", a: ["1-ին", "15-րդ", "21-րդ ", "X քրոմոսոմի"], c: 2 },
        { q: "Ո՞ր գունանյութի վրա են ազդում ալբինիզմի մուտացիաները:", a: ["Հեմոգլոբին", "Մելանինի ", "Քլորոֆիլ", "Ինսուլին"], c: 1 },
        { q: "Ո՞րն է աուտոսոմային գերիշխող հիվանդության օրինակ:", a: ["Ֆենիլկետոնուրիա", "Մարֆանի համախտանիշ ", "Հեմոֆիլիա", "Գունային կուրություն"], c: 1 },
        { q: "Ո՞ր տեխնոլոգիան է թույլ տալիս շտկել մուտացիաները բջիջներում:", a: ["Ռենտգեն", "Միջուկային թերապիա", "CRISPR տեխնոլոգիա ", "Հոմեոպաթիա"], c: 2 },
        { q: "Ինչի՞ վրա է հիմնված անհատականացված բժշկությունը:", a: ["Հիվանդի գենետիկական պրոֆիլի ", "Հիվանդի քաշի", "Հիվանդի բնակության վայրի", "Հիվանդի նախասիրությունների"], c: 0 }
    ];

    let currentIdx = 0;
    let score = 0;
    let timeLeft = 15;
    let timer;

    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const timerBar = document.getElementById('timer-bar');
    const secondsText = document.getElementById('seconds');
    const progressText = document.getElementById('progress');

    function startTimer() {
        timeLeft = 15;
        secondsText.innerText = timeLeft;
        timerBar.style.width = '100%';
        
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            secondsText.innerText = timeLeft;
            timerBar.style.width = (timeLeft / 15) * 100 + '%';
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                nextQuestion();
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            showResults();
            return;
        }

        const currentQ = questions[currentIdx];
        progressText.innerText = `Հարց ${currentIdx + 1}/${questions.length}`;
        questionText.innerText = currentQ.q;
        optionsContainer.innerHTML = '';

        currentQ.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(i, btn);
            optionsContainer.appendChild(btn);
        });

        startTimer();
    }

    function handleAnswer(index, btn) {
        clearInterval(timer);
        const correctIdx = questions[currentIdx].c;
        const buttons = optionsContainer.getElementsByClassName('option-btn');

        // Անջատել կոճակները
        for (let b of buttons) b.style.pointerEvents = 'none';

        if (index === correctIdx) {
            score++;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            buttons[correctIdx].classList.add('correct');
            btn.parentElement.style.animation = 'shake 0.5s';
        }

        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1500);
    }

    function showResults() {
        quizScreen.style.display = 'none';
        timerBar.style.display = 'none';
        resultScreen.style.display = 'block';
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        
        let msg = "";
        if (score === 10) msg = "Հիանալի է: Դուք գենետիկայի փորձագետ եք[cite: 55]!";
        else if (score > 6) msg = "Շատ լավ արդյունք: Գիտությունը հույս է տալիս[cite: 56]!";
        else msg = "Վատ չէ, բայց կարող եք ավելին սովորել ԴՆԹ-ի գաղտնիքների մասին[cite: 1]!";
        
        document.getElementById('result-message').innerText = msg;
    }

    // Սկսել խաղը
    loadQuestion();
</script>

</body>
</html>
